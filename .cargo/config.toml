# EdgeFirst HAL workspace Cargo config.
#
# IMPORTANT: target-feature flags that enable instructions beyond a
# target's guaranteed-available baseline MUST NOT live here. The HAL
# ships as a single binary per target, and baking e.g. `+f16c` or
# `+fp16` into the default build would produce binaries that SIGILL on
# older CPUs within the same target triple. Until the HAL gains runtime
# CPU-feature detection + dynamic dispatch, the default build must stay
# on the target's baseline ISA.
#
# For local development on hosts that support richer ISAs (for example
# benchmarking native fp16 on Orin Nano), developers set RUSTFLAGS
# ad-hoc — see README.md § "Local fp16 / AVX build overrides" and
# TESTING.md for the documented incantations.

# aarch64 Apple Silicon (M-series) is the one safe exception: every
# M-series chip (M1 through M4) is ARMv8.6-A+ and supports fp16,
# dotprod (sdot/udot), and i8mm (smmla/ummla/usmmla). Intel Macs
# build under the separate `x86_64-apple-darwin` triple, so this
# entry cannot misfire on non-ARM hardware.
[target.aarch64-apple-darwin]
rustflags = ["-C", "target-feature=+fp16,+dotprod,+i8mm"]

# iOS targets (aarch64-apple-ios device, aarch64-apple-ios-sim simulator).
#
# Unlike aarch64-apple-darwin, we deliberately do NOT bake
# `+fp16/+dotprod/+i8mm` here. The iOS 16+ deployment floor still
# includes A11 (iPhone 8, ARMv8.1-A, no fp16/dotprod/i8mm), so baking
# those features would SIGILL on real older hardware. Apple's A-series
# baseline for iOS 16 stays on the guaranteed ARMv8.1-A ISA.
#
# ANGLE's EGL/GLES symbols are resolved at RUNTIME via libloading
# (`Library::this()` on iOS, since the ANGLE xcframeworks are embedded
# in the app bundle) — so a standalone `cargo build` for these targets
# succeeds WITHOUT the ANGLE frameworks present. The unresolved-symbol
# warnings from the linker are expected and are satisfied at app-link
# time by the embedded `EGL.xcframework` + `GLESv2.xcframework`
# (see README.md § iOS). No rustflags, no linker overrides needed.
[target.aarch64-apple-ios]
[target.aarch64-apple-ios-sim]
