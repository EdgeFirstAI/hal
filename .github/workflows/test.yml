# GitHub Actions workflow for testing and code quality
#
# This workflow implements the Au-Zone SPS v2.3 testing patterns:
#   - Multi-platform coverage testing (x86_64, aarch64, on-target hardware)
#   - Parallel aarch64 testing: build-arm → test-arm + hardware-test in parallel
#   - Full coverage collection (Rust + Python) with profiling builds
#   - SonarCloud static analysis and coverage aggregation
#
# Build Configuration:
#   - Cargo profile: profiling (inherits release, optimized with debug symbols)
#   - Python bindings: Built with maturin develop using profiling profile
#   - Coverage: cargo-llvm-cov for Rust, slipcover for Python
#
# aarch64 Pipeline:
#   build-arm (compile + lint) → test-arm (runner tests) ──────────────┐
#                               → hardware-test (on-target tests) ─────┤→ process-hardware-coverage → sonarcloud
#
# Action Versions (hash-pinned per SPS v2.1):
# - actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd (v6.0.2)
# - actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 (v6.2.0)
# - actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a (v7.0.1)
# - actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c (v8.0.1)
# - dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 (v1)
# - Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 (v2.9.1)
# - taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 (v2.78.0)
# - SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 (v8.0.0)
# - EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 (v2.23.0)
#
# Runner Notes:
# - ubuntu-22.04: Standard GitHub-hosted runner, 4 vCPU (x86_64, used for I/O-bound
#   and aggregation jobs: checkout-lfs, sonarcloud)
# - ubuntu-22.04-xlarge: GitHub-hosted larger runner, 16 vCPU (x86_64 builds & tests)
# - ubuntu-22.04-arm-xlarge: GitHub ARM64 runner, 16 vCPU (aarch64 builds)
# - ubuntu-22.04-arm: GitHub ARM64 runner, 4 vCPU (aarch64 tests, coverage)
# - macos-latest: GitHub macOS runner (Apple Silicon)
# - nxp-imx8mp-latest: NXP i.MX 8M Plus EVK - test-only runner (NO toolchain)
#
# Build Strategy:
# - x86_64 and aarch64 builds happen on GitHub-hosted/managed runners
# - aarch64 build artifacts are shared between runner tests and hardware tests
# - imx8mp runner downloads aarch64 artifacts and runs tests only
# - Coverage processing happens on ubuntu-22.04-arm (same toolchain as build)
#
# Coverage Strategy:
# - Each platform runs tests independently and generates coverage
# - Coverage artifacts are uploaded from all platforms
# - Dedicated process job converts hardware coverage (gcda/profraw) to reports
# - SonarCloud job downloads and aggregates all coverage reports

name: Test

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop, 'release/**']
  workflow_dispatch:

defaults:
  run:
    shell: bash --noprofile --norc -e -o pipefail {0}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHON_VERSION: '3.11'
  # Pin Rust toolchain versions to ensure profraw format compatibility across
  # jobs (build-arm produces instrumented binaries, process-hardware-coverage
  # merges profraw files — both must use the same LLVM version).
  RUST_STABLE_VERSION: '1.94.0'
  RUST_NIGHTLY_VERSION: 'nightly-2026-03-15'

jobs:
  # ===========================================================================
  # Checkout LFS files (on ubuntu-22.04 which has git-lfs)
  # ===========================================================================
  checkout-lfs:
    name: Checkout LFS Files
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code with LFS
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Upload testdata as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: testdata-lfs
          path: testdata/
          retention-days: 1

  # ===========================================================================
  # Doc Tests (run once on x86_64, in parallel with other tests)
  # ===========================================================================
  doc-tests:
    name: Doc Tests
    runs-on: ubuntu-22.04-xlarge
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: true  # Doc tests use include_str!/include_bytes! which need LFS at compile time

      - name: Install OpenCV build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev libopencv-dev nasm

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: rust-x86_64-doc
          cache-on-failure: true

      - name: Run doc tests
        run: cargo test --doc --workspace --all-features

  # ===========================================================================
  # Build and Test on x86_64 (GitHub-hosted runner with Docker)
  # ===========================================================================
  build-and-test-x86:
    name: Build & Test (x86_64)
    runs-on: ubuntu-22.04-xlarge
    needs: checkout-lfs
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          lfs: false  # LFS files downloaded separately

      - name: Download LFS testdata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: testdata-lfs
          path: testdata/

      - name: Install OpenCV build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev libopencv-dev

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Python virtual environment
        run: |
          python3 -m venv venv
          echo "${{ github.workspace }}/venv/bin" >> $GITHUB_PATH
          venv/bin/pip install --upgrade pip setuptools wheel
          venv/bin/pip install maturin[patchelf] slipcover pytest pytest-timeout pytest-benchmark
          venv/bin/pip install tensorflow pyyaml numpy pillow opencv-python-headless psutil safetensors

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          components: llvm-tools-preview, clippy, rustfmt

      - name: Set up Rust nightly toolchain (for Python builds)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          components: llvm-tools-preview, rustfmt, clippy

      - name: Set Rust stable as default toolchain
        run: rustup default ${{ env.RUST_STABLE_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: rust-x86_64
          cache-on-failure: true

      - name: Install cargo tools
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4  # v2.78.0
        with:
          tool: cargo-llvm-cov@0.6.16,cargo-nextest

      - name: Check Rust formatting (advisory)
        # Format drift is a WARNING, not a hard failure — it never blocks merge.
        # The authoritative gate is the local `make format` pre-commit step
        # (see .github/copilot-instructions.md). This emits a GitHub annotation
        # so drift is visible in the PR checks UI without failing the job.
        run: |
          if ! cargo fmt --all -- --check; then
            echo "::warning title=Rust formatting drift::Run 'make format' before committing — CI does not block on formatting."
          fi

      - name: Run Clippy
        # Use default,opencv features; exclude g2d_test_formats,dma_test_formats (on-target only)
        run: cargo clippy --workspace --all-targets --features default,opencv -- -D warnings

      - name: Set up coverage instrumentation
        run: .github/scripts/setup-coverage-env.sh

      - name: Build Python bindings with coverage instrumentation
        env:
          RUSTUP_TOOLCHAIN: ${{ env.RUST_NIGHTLY_VERSION }}
        run: |
          source /tmp/coverage-env.sh
          venv/bin/maturin build \
            --manifest-path crates/python/Cargo.toml \
            --out target/wheels \
            --profile profiling \
            --features abi3-py311
          venv/bin/pip install target/wheels/*.whl

      - name: Run Rust tests with coverage
        run: |

          # Run tests but don't generate report yet - we'll combine with Python test coverage
          # Use default,opencv features; exclude g2d_test_formats,dma_test_formats (on-target only)
          cargo llvm-cov nextest --cargo-profile profiling --features default,opencv --workspace \
            --no-report -j 1 \
            2>&1 | tee target/test-metrics-rust-x86_64.txt

      - name: Build C API library
        run: |
          cargo build --release -p edgefirst-hal-capi
          ln -sf libedgefirst_hal.so target/release/libedgefirst_hal.so.0

      - name: Run C API tests
        run: |

          cd crates/capi/tests
          make test 2>&1 | tee ../../../target/test-metrics-capi-x86_64.txt

      - name: Run Python tests with coverage
        run: |

          # Source coverage env so Python tests generate profraw for PyO3 bindings
          source /tmp/coverage-env.sh
          # Python tests exercise PyO3 bindings - profraw files generated from instrumented wheel
          venv/bin/python -m slipcover --xml --out target/coverage_python.xml \
            -m pytest tests/ -v --tb=short --junitxml=target/pytest_results.xml \
            2>&1 | tee target/test-metrics-python-x86_64.txt

      - name: Generate combined Rust coverage report
        run: |
          # Generate LCOV report combining Rust tests + Python tests (PyO3 bindings coverage)
          cargo llvm-cov report --profile profiling \
            --ignore-filename-regex '(\.cargo|/rustc/|/target/)' \
            --lcov --output-path target/coverage_rust.lcov
          echo "=== Coverage summary ==="
          echo "Source files in coverage: $(grep -c '^SF:' target/coverage_rust.lcov)"
          echo "PyO3 files with coverage:"
          grep '^SF:.*crates/python' target/coverage_rust.lcov || echo "  (none found)"
          echo "=== Sample coverage data for crates/python ==="
          # Show hit counts for PyO3 files to verify they're being exercised
          awk '/^SF:.*crates\/python/{found=1; file=$0} found && /^DA:/{print file": "$0} found && /^end_of_record/{found=0}' target/coverage_rust.lcov | head -20 || true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-x86_64
          path: |
            target/coverage_rust.lcov
            target/coverage_python.xml
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-x86_64
          path: |
            target/pytest_results.xml
            target/nextest/default/test-results.xml
            target/llvm-cov-target/nextest/default/test-results.xml
            target/test-metrics-rust-x86_64.txt
            target/test-metrics-capi-x86_64.txt
            target/test-metrics-python-x86_64.txt
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040  # v2.23.0
        if: always()
        with:
          # Both nextest junit locations: plain runs use target/nextest,
          # cargo-llvm-cov (make test-rust) relocates the store dir under
          # target/llvm-cov-target. Until the nextest.toml junit.path fix
          # the Rust junit landed at a nested path no step ever found —
          # this check was silently pytest-only.
          files: |
            target/pytest_results.xml
            target/nextest/default/test-results.xml
            target/llvm-cov-target/nextest/default/test-results.xml
          check_name: Test Results (x86_64)
          comment_mode: always
          ignore_runs: true

  # ===========================================================================
  # Build and Test on macOS (Apple Silicon)
  # ===========================================================================
  build-and-test-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    needs: checkout-lfs
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: false  # LFS files downloaded separately

      - name: Download LFS testdata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: testdata-lfs
          path: testdata/

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          # llvm-tools-preview supplies the profdata/cov tooling cargo-llvm-cov
          # needs to turn the instrumented run into an LCOV report.
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: rust-macos
          cache-on-failure: true
          cache-bin: false  # Prevent overwriting rustup cargo shim with stale cached binary

      - name: Install cargo tools
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4  # v2.78.0
        with:
          tool: cargo-nextest,cargo-llvm-cov@0.6.16

      - name: Install ANGLE (Homebrew tap) and re-sign dylibs
        # ANGLE provides the libEGL.dylib + libGLESv2.dylib that
        # translate OpenGL ES 3.0 to Metal. Homebrews install_name_tool
        # post-install pass invalidates the upstream signatures
        # (Homebrew/brew#19144), so re-sign ad-hoc before any HAL
        # binary tries to dlopen them. Without this step the
        # test_yuyv_to_rgba_opengl_macos integration test silently
        # skips and the entire GL backend ships untested in CI.
        run: |
          set -euxo pipefail
          brew tap startergo/gn
          brew tap startergo/angle
          brew install startergo/angle/angle
          ANGLE_DIR="$(brew --prefix angle)/lib"
          codesign --force --sign - "$ANGLE_DIR/libEGL.dylib"
          codesign --force --sign - "$ANGLE_DIR/libGLESv2.dylib"
          echo "ANGLE installed at $ANGLE_DIR"

      - name: Run Clippy
        # Use default features only (no OpenCV, no Linux-specific hardware features)
        # Exclude Linux-only crates (gpu-probe, edgefirst-bench) that depend on DMA, EGL, DRM
        run: cargo clippy --workspace --all-targets --exclude gpu-probe --exclude edgefirst-bench -- -D warnings

      - name: Run Rust tests with coverage
        # scripts/test-macos.sh builds with --tests, signs every binary
        # with entitlements.plist (disables library validation so dlopen
        # of ad-hoc-signed ANGLE works on Tahoe), then forwards to
        # nextest. The script already injects
        # `--workspace --exclude gpu-probe --exclude edgefirst-bench`,
        # so we only add the runner-specific `-j 1` here. Without the
        # sign step the GL tests SIGKILL and silently skip.
        #
        # COVERAGE=1 instruments the build via cargo-llvm-cov (show-env), so
        # the codesign step stays between build and run — this is what lets
        # the macOS lane cover the ANGLE/IOSurface F16 GL render path that no
        # other coverage lane exercises (x86 is headless; imx8mp/Vivante
        # disables float GL).
        env:
          COVERAGE: "1"
          COV_LCOV: target/coverage_rust.lcov
          # gl_backend_available_canary: fail this lane (instead of
          # silently skipping every GL test) if the ANGLE stack above is
          # broken. Enforced in coverage pass 2 only — pass 1 runs
          # unsigned binaries with the dlopen gate closed by design.
          HAL_TEST_REQUIRE_GL: "1"
        run: |
          ./scripts/test-macos.sh -j 1 \
            2>&1 | tee target/test-metrics-rust-macos.txt

      - name: Build C API library
        run: cargo build --release -p edgefirst-hal-capi

      - name: Run C API tests
        run: |

          cd crates/capi/tests
          make test 2>&1 | tee ../../../target/test-metrics-capi-macos.txt

      - name: Coverage summary (macOS)
        # Tool-free per-lane visibility: overall lines plus the GL-engine
        # slice (the number the GL-tests-on-ANGLE port moves), straight
        # from the lcov into the job's step summary.
        if: always()
        run: |
          if [[ -f target/coverage_rust.lcov ]]; then
            awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{ if (lf>0) printf "## Coverage (macOS lane)\nLines: %d / %d (%.1f%%)\n", lh, lf, 100*lh/lf }' \
              target/coverage_rust.lcov >> "$GITHUB_STEP_SUMMARY"
            awk -F'[:,]' '/^SF:.*crates\/image\/src\/gl\//{f=1} f&&/^LF:/{lf+=$2} f&&/^LH:/{lh+=$2} /^end_of_record/{f=0} END{ if (lf>0) printf "\nGL engine (crates/image/src/gl): %d / %d (%.1f%%)\n", lh, lf, 100*lh/lf }' \
              target/coverage_rust.lcov >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          # Picked up automatically by the sonarcloud job, which globs every
          # coverage-*/**.lcov into -Dsonar.rust.lcov.reportPaths.
          name: coverage-macos
          path: |
            target/coverage_rust.lcov
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-macos
          path: |
            target/nextest/default/test-results.xml
            target/llvm-cov-target/nextest/default/test-results.xml
            target/test-metrics-*-macos.txt
          retention-days: 30

      - name: Publish test results
        # The `/macos` sub-action is the composite (Python) variant — the
        # root action is docker-based and Linux-only. Same pinned hash.
        # The coverage flow runs nextest twice and pass 2 (GL-enabled,
        # signed binaries) overwrites pass 1's junit at the same path, so
        # the published results are the GL-enabled run.
        uses: EnricoMi/publish-unit-test-result-action/macos@c950f6fb443cb5af20a377fd0dfaa78838901040  # v2.23.0
        if: always()
        with:
          # Under cargo-llvm-cov the nextest target dir is
          # target/llvm-cov-target, so the junit lands there; the plain
          # path covers COVERAGE=0 runs of test-macos.sh.
          files: |
            target/nextest/default/test-results.xml
            target/llvm-cov-target/nextest/default/test-results.xml
          check_name: Test Results (macOS)
          comment_mode: always
          ignore_runs: true

  # ===========================================================================
  # Build Check on Windows (verify Windows compilation before release)
  #
  # Catches cfg-gate mismatches between Linux/macOS-only modules (e.g.
  # opengl_headless) and feature-only #[cfg] guards that compile fine on
  # Linux but break on Windows. gpu-probe depends on EGL/GBM which are
  # Linux-only; all other workspace crates must compile on Windows.
  # ===========================================================================
  build-windows:
    name: Build Check (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: rust-windows
          cache-on-failure: true

      - name: Check workspace compiles on Windows
        run: cargo check --workspace --exclude gpu-probe

  # ===========================================================================
  # Software-GL coverage (Mesa llvmpipe)
  #
  # Exercises the Linux GL float *render* path (gl/processor/float.rs PBO
  # readback: upload_float_src / draw_float_quad / convert_float_to_pbo) with
  # no GPU. `EDGEFIRST_ALLOW_SOFTWARE_GL=1` opts past the normal software-
  # renderer rejection, and llvmpipe runs the same GLSL so the float PBO
  # roundtrip value-checks are numerically valid. The DMA-BUF path
  # (convert_float_to_dma) still needs real V3D/Mali and is not covered here.
  #
  # Bonus-coverage only — never a test gate: every test step is best-effort
  # (`|| true`, `--no-fail-fast`), so if the surfaceless EGL display does not
  # come up (GL tests then self-skip) or a GL test misbehaves on llvmpipe, the
  # job still succeeds and uploads whatever coverage it collected. The x86 /
  # macOS / hardware lanes remain the authoritative test gates.
  # ===========================================================================
  software-gl-coverage:
    name: Software-GL Coverage (llvmpipe)
    runs-on: ubuntu-22.04-xlarge
    needs: checkout-lfs
    permissions:
      contents: read
    env:
      LIBGL_ALWAYS_SOFTWARE: '1'
      EGL_PLATFORM: surfaceless
      EDGEFIRST_ALLOW_SOFTWARE_GL: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          lfs: false  # LFS files downloaded separately

      - name: Download LFS testdata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: testdata-lfs
          path: testdata/

      - name: Install Mesa llvmpipe (software OpenGL ES + EGL)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dri libegl1 libegl-mesa0 libgles2 mesa-utils-extra

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: rust-x86_64
          cache-on-failure: true

      - name: Install cargo tools
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4  # v2.78.0
        with:
          tool: cargo-llvm-cov@0.6.16,cargo-nextest

      - name: Probe software-GL bring-up (diagnostic, non-fatal)
        run: |
          echo "=== eglinfo ==="
          eglinfo -B 2>&1 | head -50 || true
          echo "=== HAL gpu-probe (does the GL context come up on llvmpipe?) ==="
          cargo run -p gpu-probe -- --probe-only 2>&1 | head -60 || true

      - name: Run image GL tests under coverage (Mesa llvmpipe)
        run: |
          # Single-threaded is mandatory for the image crate (GL_MUTEX). The
          # float PBO roundtrips run here when the llvmpipe context comes up;
          # best-effort so a software-GL hiccup never fails CI.
          #
          # The `*_no_bleed_gl` crop tests assert tight per-pixel boundaries
          # that depend on the GPU's exact texture-sampling/rounding; llvmpipe's
          # software sampler differs slightly, so they fail here while passing
          # on every real-GPU lane (macOS/ANGLE, V3D, Mali). Exclude them on
          # this lane only — they remain covered by the GPU lanes — so a real
          # regression here is not masked by known software-sampler noise.
          cargo llvm-cov nextest -p edgefirst-image --features default \
            --no-fail-fast -j 1 \
            -E 'not test(~no_bleed_gl)' \
            --lcov --output-path target/coverage_rust.lcov \
            --ignore-filename-regex '(\.cargo|/rustc/|/target/)' \
            2>&1 | tee target/test-metrics-software-gl.txt || true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          # Globbed into the SonarCloud scan alongside the other coverage-*.
          name: coverage-software-gl
          path: |
            target/coverage_rust.lcov
            target/test-metrics-software-gl.txt
          retention-days: 30

  # ===========================================================================
  # Build on aarch64 (compile + lint, upload artifacts for test-arm & hardware-test)
  # ===========================================================================
  build-arm:
    name: Build (aarch64)
    runs-on: ubuntu-22.04-arm-xlarge
    needs: checkout-lfs

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          lfs: false  # LFS files downloaded separately

      - name: Download LFS testdata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: testdata-lfs
          path: testdata/

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev clang libclang-dev libopencv-dev

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set PYO3_PYTHON environment variable
        run: echo "PYO3_PYTHON=$(which python3)" >> $GITHUB_ENV

      - name: Set up Python virtual environment
        run: |
          python3 -m venv venv
          echo "${{ github.workspace }}/venv/bin" >> $GITHUB_PATH
          venv/bin/pip install --upgrade pip setuptools wheel
          venv/bin/pip install maturin[patchelf,zig]

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          components: llvm-tools-preview

      - name: Set up Rust nightly toolchain (for Python builds)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          components: llvm-tools-preview

      - name: Set Rust stable as default toolchain
        run: rustup default ${{ env.RUST_STABLE_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: rust-aarch64
          cache-on-failure: true

      - name: Install cargo tools
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4  # v2.78.0
        with:
          tool: cargo-llvm-cov@0.6.16,cargo-nextest

      # NOTE: cargo fmt and clippy run in build-and-test-x86 — no need to repeat
      # on aarch64 since they are platform-independent.

      - name: Set up coverage instrumentation
        run: .github/scripts/setup-coverage-env.sh

      - name: Build Python bindings with coverage instrumentation
        env:
          RUSTUP_TOOLCHAIN: ${{ env.RUST_NIGHTLY_VERSION }}
        run: |
          source /tmp/coverage-env.sh
          # No zig/manylinux - target glibc (2.41) is newer than Ubuntu 22.04 (2.35)
          venv/bin/maturin build \
            --manifest-path crates/python/Cargo.toml \
            --out target/wheels \
            --profile profiling \
            --features abi3-py311

      - name: Build runner test binaries (no-run)
        run: |
          source /tmp/coverage-env.sh
          cargo nextest run --no-run --cargo-profile profiling --features default,opencv --workspace
          mkdir -p runner-test-binaries
          find target/llvm-cov-target/profiling/deps/ -maxdepth 1 -type f -executable \
            ! -name "*.d" ! -name "*.rlib" ! -name "*.rmeta" ! -name "*.so" \
            -exec cp {} runner-test-binaries/ \; 2>/dev/null || true
          echo "Runner test binaries:"
          ls -la runner-test-binaries/ || echo "No test binaries found"

      - name: Build hardware test binaries (GPU/DMA tests only)
        run: |
          source /tmp/coverage-env.sh
          # Only build crates that exercise hardware paths (G2D, EGL, DMA).
          # CPU-only crates (bench, decoder, tracker, capi) run on the aarch64 runner.
          # Exclude opencv — no opencv tests run on hardware, and dropping it
          # significantly reduces binary size (faster transfer to embedded target).
          # LTO=thin in the profiling profile strips unreachable code across crates.
          cargo nextest run --no-run --cargo-profile profiling \
            --package edgefirst-image \
            --features opengl,g2d_test_formats,dma_test_formats
          cargo nextest run --no-run --cargo-profile profiling \
            --package edgefirst-tensor
          mkdir -p hardware-test-binaries
          find target/llvm-cov-target/profiling/deps/ -maxdepth 1 -type f -executable \
            ! -name "*.d" ! -name "*.rlib" ! -name "*.rmeta" ! -name "*.so" \
            -exec cp {} hardware-test-binaries/ \; 2>/dev/null || true
          find target/profiling/deps/ -maxdepth 1 -type f -executable \
            ! -name "*.d" ! -name "*.rlib" ! -name "*.rmeta" ! -name "*.so" \
            -exec cp {} hardware-test-binaries/ \; 2>/dev/null || true
          echo "Instrumented test binaries:"
          ls -la hardware-test-binaries/ || echo "No test binaries found"

      - name: Build C API library
        run: |
          cargo build --release -p edgefirst-hal-capi
          ln -sf libedgefirst_hal.so target/release/libedgefirst_hal.so.0

      - name: Build C API tests
        run: |
          cd crates/capi/tests
          make all
          cd ../../..
          # Copy C API artifacts for testing
          mkdir -p hardware-capi-tests
          cp target/release/libedgefirst_hal.so hardware-capi-tests/
          cp target/release/libedgefirst_hal.so.0 hardware-capi-tests/
          cp target/release/libedgefirst_hal.a hardware-capi-tests/ 2>/dev/null || true
          cp crates/capi/build/test_all hardware-capi-tests/
          echo "C API test artifacts:"
          ls -la hardware-capi-tests/

      - name: Prepare stripped binaries for hardware deployment
        run: |
          set -euo pipefail
          # Cross-compiled aarch64 test binaries built with --profile profiling
          # carry full DWARF debug info AND coverage instrumentation. The
          # `__llvm_prf_*` ELF sections that drive profraw generation are
          # independent of DWARF — `strip --strip-debug` removes the debug
          # info while preserving the instrumentation, shrinking each binary
          # ~5-10× and proportionally reducing the artifact download on the
          # on-target runner. The unstripped originals stay in place for:
          #   - test-arm (in-place coverage processing, uses runner-test-binaries/)
          #   - process-hardware-coverage (host-side llvm-cov export, uses
          #     coverage-binaries-aarch64)
          # so source-line attribution still works for both Rust and Python
          # profraw files captured on hardware.

          mkdir -p hardware-test-binaries-stripped
          cp -a hardware-test-binaries/. hardware-test-binaries-stripped/
          for bin in hardware-test-binaries-stripped/*; do
            [ -x "$bin" ] && file "$bin" 2>/dev/null | grep -q "ELF" \
              && strip --strip-debug "$bin"
          done

          mkdir -p hardware-capi-tests-stripped
          cp -a hardware-capi-tests/. hardware-capi-tests-stripped/
          # libedgefirst_hal.a is consumed at link time only; running tests
          # on the target dynamic-links against the .so. Drop the static
          # archive from the hardware deployment artifact.
          rm -f hardware-capi-tests-stripped/libedgefirst_hal.a
          for bin in hardware-capi-tests-stripped/test_all \
                     hardware-capi-tests-stripped/libedgefirst_hal.so*; do
            [ -f "$bin" ] && strip --strip-debug "$bin" 2>/dev/null || true
          done

          # Python wheels — use the venv's `wheel` to unpack and repack so the
          # PEP 376 RECORD manifest (SHA256 hashes of every file) is
          # regenerated after the embedded .so files are stripped. pip will
          # warn or fail on RECORD mismatch otherwise.
          mkdir -p target/wheels-stripped
          for whl_in in target/wheels/*.whl; do
            [ -f "$whl_in" ] || continue
            tmp=$(mktemp -d)
            venv/bin/wheel unpack --dest "$tmp" "$whl_in"
            find "$tmp" -name "*.so" -exec strip --strip-debug {} \;
            unpacked_dir=$(ls -d "$tmp"/*/ | head -1)
            venv/bin/wheel pack --dest-dir target/wheels-stripped "$unpacked_dir"
            rm -rf "$tmp"
          done

          echo "=== Hardware deployment artifact sizes (stripped vs original) ==="
          du -sh hardware-test-binaries/ hardware-test-binaries-stripped/
          du -sh hardware-capi-tests/ hardware-capi-tests-stripped/
          du -sh target/wheels/ target/wheels-stripped/

      - name: Upload runner test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: runner-test-artifacts
          path: |
            runner-test-binaries/
            target/wheels/*.whl
            hardware-capi-tests/
            target/release/libedgefirst_hal.so
            target/release/libedgefirst_hal.so.0
          retention-days: 7

      - name: Upload hardware test artifacts (stripped, fast on-target download)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: hardware-test-binaries
          path: |
            target/wheels-stripped/*.whl
            hardware-test-binaries-stripped/
            hardware-capi-tests-stripped/
          retention-days: 7

      - name: Upload coverage instrumented binaries (for profraw processing)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-binaries-aarch64
          path: |
            hardware-test-binaries/
            target/llvm-cov-target/profiling/deps/*.so
          retention-days: 7

  # ===========================================================================
  # Test on aarch64 runner (uses pre-built artifacts from build-arm)
  # ===========================================================================
  test-arm:
    name: Test (aarch64)
    runs-on: ubuntu-22.04-arm
    needs: [checkout-lfs, build-arm]
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          lfs: false  # LFS files downloaded separately

      - name: Download LFS testdata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: testdata-lfs
          path: testdata/

      - name: Download runner test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: runner-test-artifacts
          path: .  # Download to workspace root to preserve directory structure

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Python virtual environment
        run: |
          python3 -m venv venv
          echo "${{ github.workspace }}/venv/bin" >> $GITHUB_PATH
          venv/bin/pip install --upgrade pip setuptools wheel
          venv/bin/pip install slipcover pytest pytest-timeout pytest-benchmark
          venv/bin/pip install tensorflow pyyaml numpy pillow opencv-python-headless psutil safetensors
          # Install Python bindings from pre-built wheel
          venv/bin/pip install target/wheels/*.whl

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          components: llvm-tools-preview

      - name: Run pre-built Rust tests
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/build/profraw/rust-%p-%m.profraw
          # Test binaries were cross-compiled on build-arm; their baked-in
          # CARGO_MANIFEST_DIR paths don't resolve on this runner. Point
          # edgefirst_bench::testdata at the downloaded testdata directory.
          EDGEFIRST_TESTDATA_DIR: ${{ github.workspace }}/testdata
        run: |

          mkdir -p build/profraw build/rust-test-results
          chmod +x runner-test-binaries/* 2>/dev/null || true
          TEST_FAILED=0
          for test_bin in runner-test-binaries/*; do
            if [ -x "$test_bin" ] && [ -f "$test_bin" ]; then
              # Skip .so files (proc-macro shared libraries)
              if [[ "$test_bin" == *.so ]]; then
                continue
              fi
              test_name=$(basename "$test_bin")
              echo "=== Running $test_name ==="
              if ! "$test_bin" --test-threads=1 2>&1 | tee "build/rust-test-results/${test_name}.txt"; then
                echo "FAILED: $test_name"
                TEST_FAILED=1
              fi
            fi
          done
          [ $TEST_FAILED -eq 0 ] || exit 1

      - name: Run C API tests
        env:
          EDGEFIRST_TESTDATA_DIR: ${{ github.workspace }}/testdata
        run: |

          if [ -d "hardware-capi-tests" ] && [ -f "hardware-capi-tests/test_all" ]; then
            echo "=== Running C API tests ==="
            chmod +x hardware-capi-tests/test_all
            export LD_LIBRARY_PATH=$(pwd)/hardware-capi-tests:$LD_LIBRARY_PATH
            hardware-capi-tests/test_all 2>&1 | tee build/test-metrics-capi-aarch64.txt
          else
            echo "C API test binary not found, skipping"
          fi

      - name: Run Python tests with coverage
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/build/profraw/py-%p-%m.profraw
          EDGEFIRST_TESTDATA_DIR: ${{ github.workspace }}/testdata
        run: |

          mkdir -p build/profraw
          venv/bin/python -m slipcover --xml --out target/coverage_python.xml \
            -m pytest tests/ -v --tb=short --junitxml=target/pytest_results.xml \
            2>&1 | tee build/test-metrics-python-aarch64.txt

      - name: Generate JUnit XML from Rust results
        if: always()
        run: python3 .github/scripts/generate_junit_xml.py build/rust-test-results build/rust_runner_results.xml

      - name: Process Rust coverage
        if: always()
        run: |
          TOOLCHAIN_ROOT=$(rustc --print sysroot)
          LLVM_PROFDATA=$(find "$TOOLCHAIN_ROOT" -name "llvm-profdata" -type f | head -1)
          LLVM_COV=$(find "$TOOLCHAIN_ROOT" -name "llvm-cov" -type f | head -1)

          PROFRAW_COUNT=$(find build/profraw/ -name "*.profraw" 2>/dev/null | wc -l)
          echo "Found $PROFRAW_COUNT profraw files"

          if [ "$PROFRAW_COUNT" -eq 0 ]; then
            echo "No profraw files, creating empty coverage"
            mkdir -p target
            echo "" > target/coverage_rust.lcov
            exit 0
          fi

          # Merge profraw files (--failure-mode=all skips corrupted files)
          "$LLVM_PROFDATA" merge -sparse --failure-mode=all build/profraw/*.profraw -o build/merged.profdata

          # Collect object files (test binaries + Python .so)
          FIRST_OBJ=""
          OBJECT_ARGS=""
          for obj in runner-test-binaries/*; do
            if [ -f "$obj" ] && file "$obj" | grep -q "ELF"; then
              if [ -z "$FIRST_OBJ" ]; then
                FIRST_OBJ="$obj"
              else
                OBJECT_ARGS="$OBJECT_ARGS --object=$obj"
              fi
            fi
          done
          # Include Python .so for PyO3 coverage
          PY_SO=$(find venv/ -name "edgefirst_hal*.so" -type f | head -1)
          if [ -n "$PY_SO" ]; then
            OBJECT_ARGS="$OBJECT_ARGS --object=$PY_SO"
          fi

          if [ -z "$FIRST_OBJ" ]; then
            echo "No ELF binaries found, creating empty coverage"
            mkdir -p target
            echo "" > target/coverage_rust.lcov
            exit 0
          fi

          mkdir -p target
          "$LLVM_COV" export --format=lcov --instr-profile=build/merged.profdata \
            --ignore-filename-regex='(\.cargo|/rustc/|/target/)' \
            $FIRST_OBJ $OBJECT_ARGS > target/coverage_rust.lcov 2>/dev/null || echo "" > target/coverage_rust.lcov

          echo "=== Coverage summary ==="
          echo "Source files in coverage: $(grep -c '^SF:' target/coverage_rust.lcov || echo 0)"
          echo "PyO3 files with coverage:"
          grep '^SF:.*crates/python' target/coverage_rust.lcov || echo "  (none found)"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-aarch64
          path: |
            target/coverage_rust.lcov
            target/coverage_python.xml
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-aarch64
          path: |
            target/pytest_results.xml
            build/rust_runner_results.xml
            build/test-metrics-python-aarch64.txt
            build/test-metrics-capi-aarch64.txt
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040  # v2.23.0
        if: always()
        with:
          files: |
            target/pytest_results.xml
            build/rust_runner_results.xml
          check_name: Test Results (aarch64)
          comment_mode: always
          ignore_runs: true

  # ===========================================================================
  # Hardware Testing on NXP i.MX8M Plus
  # ===========================================================================
  hardware-test:
    name: Hardware Test (imx8mp)
    needs: [checkout-lfs, build-arm]
    runs-on: nxp-imx8mp-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Clean workspace
        run: |
          rm -rf build/ venv/ target/ rust-tests/ testdata/ \
                 hardware-test-binaries-stripped/ \
                 hardware-capi-tests-stripped/ 2>/dev/null || true
          find . -name "*.gcda" -o -name "*.profraw" -delete 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: false  # LFS files downloaded separately

      - name: Download LFS testdata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: testdata-lfs
          path: testdata/

      - name: Download aarch64 test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: hardware-test-binaries
          path: .  # Download to workspace root to preserve directory structure

      - name: Set up Python virtual environment
        run: |
          python3 -m venv venv
          echo "${{ github.workspace }}/venv/bin" >> $GITHUB_PATH
          venv/bin/pip install --upgrade pip setuptools wheel
          venv/bin/pip install slipcover pytest pytest-timeout pytest-benchmark numpy pillow psutil safetensors
          # Install Python bindings from pre-built wheel (stripped for fast
          # download; coverage processing on the host uses the unstripped
          # copy from coverage-binaries-aarch64).
          venv/bin/pip install target/wheels-stripped/*.whl

      - name: Debug environment info
        run: |
          echo "=== System Info ===" && uname -a
          echo "=== DMA heap ===" && ls -la /dev/dma_heap/ 2>/dev/null || echo "Not found"
          echo "=== G2D ===" && ls -la /dev/galcore 2>/dev/null || echo "Not found"
          echo "=== Downloaded artifacts ===" && find . -name "*.so*" -o -name "profiling" -type d 2>/dev/null || echo "Not found"
          echo "=== Test binaries ===" && ls -la hardware-test-binaries-stripped/ 2>/dev/null || echo "Not found"

      - name: Run Python tests with coverage
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/build/profraw/%p-%m.profraw
          EDGEFIRST_TESTDATA_DIR: ${{ github.workspace }}/testdata
        run: |
          mkdir -p build/profraw
          export LD_LIBRARY_PATH=$(pwd)/target/profiling:$LD_LIBRARY_PATH
          # Run pytest and capture exit code separately from process exit.
          # On i.MX hardware, the Vivante GPU driver may cause a SIGABRT
          # ("corrupted double-linked list") during Python interpreter shutdown
          # after all tests have passed. This is an uncatchable C-level crash
          # in the EGL driver's atexit cleanup — see ARCHITECTURE.md for details.
          # We use the JUnit XML result as the source of truth for test outcomes.
          EXIT_CODE=0
          venv/bin/python -m slipcover --xml --out build/coverage_python.xml \
            -m pytest tests/ -v --tb=short --junitxml=build/pytest_results.xml \
            2>&1 | tee build/test-metrics-python-imx8mp.txt || EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            if [ -f build/pytest_results.xml ] && grep -q 'failures="0"' build/pytest_results.xml && grep -q 'errors="0"' build/pytest_results.xml; then
              echo "::warning::Python process exited with code $EXIT_CODE (likely GPU driver crash during shutdown) but all tests passed"
            else
              echo "::error::Python tests failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi

      - name: Run pre-built Rust tests (hardware-dependent only)
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/profiling:$LD_LIBRARY_PATH
          LLVM_PROFILE_FILE: ${{ github.workspace }}/build/profraw/rust-%p-%m.profraw
          # Cross-compiled binaries cannot use their compile-time CARGO_MANIFEST_DIR
          # path on this runner; point edgefirst_bench::testdata at the downloaded
          # testdata directory.
          EDGEFIRST_TESTDATA_DIR: ${{ github.workspace }}/testdata
        run: |
          # Only run tests that exercise hardware (G2D, OpenGL/EGL, DMA).
          # CPU-only tests already run on the ubuntu-22.04-arm-xlarge runner.
          mkdir -p build/rust-test-results build/profraw
          chmod +x hardware-test-binaries/* 2>/dev/null || true
          TEST_FAILED=0

          run_filtered() {
            local test_bin="$1" filter="$2" label="$3"
            local test_name
            test_name=$(basename "$test_bin")
            echo "=== Running $test_name ($label) ==="
            EXIT_CODE=0
            local logfile="build/rust-test-results/${test_name}-${label// /-}.txt"
            "$test_bin" "$filter" --test-threads=1 2>&1 | tee "$logfile" || EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              # Check if all tests actually passed but process crashed on
              # exit (Vivante GPU driver SIGABRT during library unload)
              if grep -q 'test result: ok' "$logfile" && \
                 ! grep -q 'FAILED' "$logfile"; then
                echo "::warning::$test_name ($label) exited with code $EXIT_CODE (likely GPU driver crash during shutdown) but all tests passed"
              else
                echo "FAILED: $test_name ($label)"
                TEST_FAILED=1
              fi
            fi
          }

          for test_bin in hardware-test-binaries-stripped/*; do
            [[ -x "$test_bin" && -f "$test_bin" ]] || continue
            [[ "$test_bin" == *.so ]] && continue
            test_name=$(basename "$test_bin")

            if [[ "$test_name" == edgefirst_image-* ]]; then
              # G2D tests (g2d.rs module + lib.rs g2d integration tests)
              run_filtered "$test_bin" g2d "G2D tests"
              # OpenGL/EGL tests (gl/tests.rs + lib.rs opengl integration tests)
              run_filtered "$test_bin" opengl "OpenGL tests"
            elif [[ "$test_name" == edgefirst_tensor-* ]]; then
              # DMA-heap tensor tests only
              run_filtered "$test_bin" dma "DMA tests"
            else
              echo "=== Skipping $test_name (CPU-only, covered by aarch64 runner) ==="
            fi
          done
          [ $TEST_FAILED -eq 0 ] || exit 1

      - name: Run C API tests
        env:
          EDGEFIRST_TESTDATA_DIR: ${{ github.workspace }}/testdata
        run: |

          if [ -d "hardware-capi-tests-stripped" ] && [ -f "hardware-capi-tests-stripped/test_all" ]; then
            echo "=== Running C API tests on hardware ==="
            chmod +x hardware-capi-tests-stripped/test_all
            export LD_LIBRARY_PATH=$(pwd)/hardware-capi-tests-stripped:$LD_LIBRARY_PATH
            # Same SIGABRT-on-exit issue as Python tests — the Vivante EGL
            # driver may crash during library unload after all tests pass.
            # Use the test summary output as the source of truth.
            EXIT_CODE=0
            hardware-capi-tests-stripped/test_all 2>&1 | tee build/test-metrics-capi-imx8mp.txt || EXIT_CODE=$?

            if [ $EXIT_CODE -ne 0 ]; then
              if grep -q 'Failed: 0' build/test-metrics-capi-imx8mp.txt; then
                echo "::warning::C API test process exited with code $EXIT_CODE (likely GPU driver crash during shutdown) but all tests passed"
              else
                echo "::error::C API tests failed with exit code $EXIT_CODE"
                exit $EXIT_CODE
              fi
            fi
          else
            echo "C API test binary not found, skipping"
          fi

      - name: Generate JUnit XML from Rust results
        if: always()
        run: python3 .github/scripts/generate_junit_xml.py build/rust-test-results build/rust_hardware_results.xml

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-imx8mp
          path: |
            build/coverage_python.xml
            build/profraw/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-imx8mp
          path: |
            build/pytest_results.xml
            build/rust_hardware_results.xml
            build/test-metrics-python-imx8mp.txt
            build/test-metrics-capi-imx8mp.txt
          retention-days: 30

      - name: Test results summary (imx8mp)
        if: always()
        run: |
          echo "## Hardware Test Results (imx8mp)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/pytest_results.xml ]; then
            echo "- Python tests completed - see artifacts for details" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f build/rust_hardware_results.xml ]; then
            echo "- Rust tests completed - see artifacts for details" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f build/test-metrics-capi-imx8mp.txt ]; then
            echo "- C API tests completed - see artifacts for details" >> $GITHUB_STEP_SUMMARY
          fi


  # ===========================================================================
  # Process Hardware Coverage (profraw -> LCOV)
  # ===========================================================================
  process-hardware-coverage:
    name: Process Hardware Coverage
    needs: [build-arm, hardware-test]
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download coverage instrumented binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-binaries-aarch64
          path: target/llvm-cov-target/profiling/deps/

      - name: Download imx8mp coverage (contains profraw files)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-imx8mp
          path: coverage-imx8mp/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          components: llvm-tools-preview

      - name: Process Rust profraw files
        run: |
          PROFRAW_COUNT=$(find coverage-imx8mp/ -name "*.profraw" 2>/dev/null | wc -l)
          echo "Found $PROFRAW_COUNT profraw files"

          if [ "$PROFRAW_COUNT" -eq 0 ]; then
            echo "No profraw files, creating empty coverage"
            mkdir -p output && echo "" > output/coverage_rust_imx8mp.lcov
            exit 0
          fi

          TOOLCHAIN_ROOT=$(rustc --print sysroot)
          LLVM_PROFDATA=$(find "$TOOLCHAIN_ROOT" -name "llvm-profdata" -type f | head -1)
          LLVM_COV=$(find "$TOOLCHAIN_ROOT" -name "llvm-cov" -type f | head -1)

          mkdir -p output
          # --failure-mode=all: skip corrupted profraw files (e.g. from GPU driver
          # SIGABRT on test exit) instead of failing the entire merge.
          "$LLVM_PROFDATA" merge -sparse --failure-mode=all \
            $(find coverage-imx8mp/ -name "*.profraw") -o output/imx8mp.profdata

          OBJECT_FILES=""
          for obj in $(find target/llvm-cov-target -type f ! -name "*.d" ! -name "*.rlib" ! -name "*.rmeta" 2>/dev/null); do
            if file "$obj" 2>/dev/null | grep -q "ELF"; then
              [ -z "$OBJECT_FILES" ] && OBJECT_FILES="$obj" || OBJECT_FILES="$OBJECT_FILES --object=$obj"
            fi
          done

          if [ -z "$OBJECT_FILES" ]; then
            echo "No ELF binaries found, creating empty coverage"
            echo "" > output/coverage_rust_imx8mp.lcov
            exit 0
          fi

          "$LLVM_COV" export --format=lcov --instr-profile=output/imx8mp.profdata \
            --ignore-filename-regex='/.cargo/registry|/rustc/' \
            --path-equivalence="/home/runner/work/hal/hal","${{ github.workspace }}" \
            $OBJECT_FILES > output/coverage_rust_imx8mp.lcov 2>/dev/null || echo "" > output/coverage_rust_imx8mp.lcov

          echo "Generated coverage_rust_imx8mp.lcov: $(wc -l < output/coverage_rust_imx8mp.lcov) lines"

      - name: Upload processed coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-imx8mp-processed
          path: |
            output/coverage_rust_imx8mp.lcov
            coverage-imx8mp/build/coverage_python.xml
          retention-days: 30

  # ===========================================================================
  # SonarCloud Analysis
  # ===========================================================================
  sonarcloud:
    name: SonarCloud Analysis
    needs: [doc-tests, build-and-test-x86, build-and-test-macos, software-gl-coverage, test-arm, process-hardware-coverage]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Download all coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: coverage-*
          path: coverage/

      - name: Organize coverage files
        run: |
          echo "=== Downloaded coverage artifacts ==="
          find coverage/ -type f

          echo "=== Fixing Python coverage paths ==="
          for xml in $(find coverage/ -name "coverage_python.xml" -type f); do
            python3 .github/scripts/fix_coverage_paths.py "$xml" tests
          done

          echo "=== Normalizing LCOV source paths to repo-relative ==="
          # cargo-llvm-cov writes absolute SF: paths. The Linux lanes'
          # /home/runner/work/hal/hal/... happen to match this scanner
          # host's checkout, so they resolved by accident; the macOS
          # lane's /Users/runner/work/hal/hal/... never did — its
          # coverage (the only ANGLE/IOSurface GL coverage) was silently
          # dropped by SonarCloud. Strip everything up to the repo root
          # so every lane resolves identically, on any runner layout.
          for lcov in $(find coverage/ -name "*.lcov" -type f); do
            sed -i -E 's|^SF:.*/work/hal/hal/|SF:|' "$lcov"
          done

          RUST_REPORTS=$(find coverage/ -name "*.lcov" | tr '\n' ',' | sed 's/,$//')
          PYTHON_REPORTS=$(find coverage/ -name "coverage_python.xml" | tr '\n' ',' | sed 's/,$//')

          echo "Rust: $RUST_REPORTS"
          echo "Python: $PYTHON_REPORTS"
          echo "RUST_COVERAGE_PATHS=$RUST_REPORTS" >> $GITHUB_ENV
          echo "PYTHON_COVERAGE_PATHS=$PYTHON_REPORTS" >> $GITHUB_ENV

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432  # v8.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            "-Dsonar.rust.lcov.reportPaths=${{ env.RUST_COVERAGE_PATHS }}"
            "-Dsonar.python.coverage.reportPaths=${{ env.PYTHON_COVERAGE_PATHS }}"
            "-Dsonar.verbose=true"

      - name: Generate summary
        if: always()
        run: |
          {
            echo "# HAL Test & Coverage Summary"
            echo ""
            echo "## Test Platforms"
            echo "| Platform | Architecture | Tests |"
            echo "|----------|--------------|-------|"
            echo "| Ubuntu 22.04 | x86_64 | Rust, Python, C API |"
            echo "| Ubuntu 22.04 | aarch64 | Rust, Python, C API |"
            echo "| macOS | Apple Silicon | Rust, C API |"
            echo "| NXP i.MX8M Plus | aarch64 | Rust, Python, C API (DMA, G2D) |"
            echo ""
            python3 .github/scripts/coverage_summary.py --github-actions
            echo ""
            echo "## SonarCloud"
            echo "- [Dashboard](https://sonarcloud.io/summary/overall?id=EdgeFirstAI_hal&branch=${{ github.ref_name }})"
          } >> $GITHUB_STEP_SUMMARY
