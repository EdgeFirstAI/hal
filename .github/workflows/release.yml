# Release Workflow
#
# Builds Python wheels for multiple platforms and publishes to PyPI and crates.io
# on tagged releases. Supports both stable releases (X.Y.Z) and release candidates (X.Y.ZrcN).
#
# Action Versions (hash-pinned for security per Au-Zone SPS v2.1):
# - actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd (v6.0.2)
# - actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 (v6.2.0)
# - actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a (v7.0.1)
# - actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c (v8.0.1)
# - dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 (v1)
# - rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe (v1.0.4)
# - pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b (v1.14.0)
# - softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda (v3.0.0)
#
# Trusted Publisher Configuration:
# - PyPI: https://pypi.org/manage/project/edgefirst-hal/settings/publishing/
#   Owner: EdgeFirstAI, Repository: hal, Workflow: release.yml, Environment: pypi
# - crates.io: https://crates.io/settings/tokens
#   Owner: EdgeFirstAI, Repository: hal, Workflow: release.yml, Environment: crates-io

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build release for'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_STABLE_VERSION: '1.94.0'

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: x86_64-linux
            runner: ubuntu-latest
            maturin-args: --sdist --zig --compatibility manylinux2014
            maturin-deps: maturin[patchelf,zig]
          - name: aarch64-linux
            runner: ubuntu-22.04-arm
            maturin-args: --zig --compatibility manylinux2014
            maturin-deps: maturin[patchelf,zig]
          - name: windows
            runner: windows-latest
            maturin-args: ''
            maturin-deps: maturin
          - name: macos
            runner: macos-latest
            maturin-args: ''
            maturin-deps: maturin

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install ${{ matrix.maturin-deps }}

      - name: Build wheels (Python 3.11+ — zero-copy buffer protocol)
        run: maturin build --release -m crates/python/Cargo.toml --features abi3-py311 ${{ matrix.maturin-args }}

      - name: Build wheels (Python 3.8+ — compatible fallback)
        shell: bash
        run: |
          # Strip --sdist from args (sdist already generated in the py311 build above)
          ARGS="${{ matrix.maturin-args }}"
          maturin build --release -m crates/python/Cargo.toml --features abi3-py38 ${ARGS//--sdist/}

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheels-${{ matrix.name }}
          path: target/wheels/*

  build-capi:
    name: Build C API (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest
            lib_shared: libedgefirst_hal.so
          - target: aarch64-linux
            runner: ubuntu-22.04-arm
            lib_shared: libedgefirst_hal.so
          - target: aarch64-macos
            runner: macos-latest
            lib_shared: libedgefirst_hal.dylib

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}

      - name: Build C API library
        run: cargo build --release -p edgefirst-hal-capi

      - name: Package C API
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PKG_NAME="edgefirst-hal-capi-${VERSION}-${{ matrix.target }}"
          mkdir -p "${PKG_NAME}/include/edgefirst" "${PKG_NAME}/lib" "${PKG_NAME}/lib/pkgconfig"

          # Copy documentation and license files
          cp crates/capi/README.md "${PKG_NAME}/"
          cp LICENSE "${PKG_NAME}/"
          cp NOTICE "${PKG_NAME}/"

          # Copy header
          cp crates/capi/include/edgefirst/hal.h "${PKG_NAME}/include/edgefirst/"

          # Ship the shared library as a proper symlink chain following the
          # standard GNU/Linux convention:
          #
          #   libedgefirst_hal.so                      → libedgefirst_hal.so.${MAJOR}
          #   libedgefirst_hal.so.${MAJOR}             → libedgefirst_hal.so.${MAJOR}.${MINOR}
          #   libedgefirst_hal.so.${MAJOR}.${MINOR}    → libedgefirst_hal.so.${MAJOR}.${MINOR}.${PATCH}
          #   libedgefirst_hal.so.${MAJOR}.${MINOR}.${PATCH}   (real file)
          #
          # DT_SONAME inside the ELF is libedgefirst_hal.so.${MAJOR} (see
          # crates/capi/build.rs), which matches the second-level symlink so
          # the dynamic linker resolves through the chain at runtime.
          if [ -f "target/release/${{ matrix.lib_shared }}" ]; then
            if [[ "${{ matrix.target }}" == *-linux ]]; then
              cp "target/release/${{ matrix.lib_shared }}" "${PKG_NAME}/lib/libedgefirst_hal.so.${MAJOR}.${MINOR}.${PATCH}"
              ln -s "libedgefirst_hal.so.${MAJOR}.${MINOR}.${PATCH}" "${PKG_NAME}/lib/libedgefirst_hal.so.${MAJOR}.${MINOR}"
              ln -s "libedgefirst_hal.so.${MAJOR}.${MINOR}"          "${PKG_NAME}/lib/libedgefirst_hal.so.${MAJOR}"
              ln -s "libedgefirst_hal.so.${MAJOR}"                   "${PKG_NAME}/lib/libedgefirst_hal.so"
            else
              cp "target/release/${{ matrix.lib_shared }}" "${PKG_NAME}/lib/"
            fi
          fi

          # Copy static library
          cp target/release/libedgefirst_hal.a "${PKG_NAME}/lib/"

          # Generate pkg-config file
          sed "s/@VERSION@/${VERSION}/" crates/capi/edgefirst-hal.pc.in > "${PKG_NAME}/lib/pkgconfig/edgefirst-hal.pc"

          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_ENV"

      - name: Upload C API artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: capi-${{ matrix.target }}
          path: ${{ env.PKG_NAME }}.tar.gz

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-22.04
    needs: [build-wheels]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/project/edgefirst-hal/
    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          skip-existing: true

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-22.04
    needs: [build-wheels]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: crates-io
      url: https://crates.io/crates/edgefirst-hal
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}

      - name: Authenticate to crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4
        id: auth

      - name: Publish crates to crates.io
        run: |
          output=$(cargo publish --workspace --no-verify 2>&1) && exit 0
          echo "$output"
          if echo "$output" | grep -q "already uploaded"; then
            echo "::warning::Some crates were already published — skipping"
            exit 0
          fi
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-wheels, build-capi]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download C API artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: capi-*
          path: dist
          merge-multiple: true

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          awk "/## \[$VERSION\]/,/^## \[/{if (/^## \[/ && !found) {found=1; next} if (/^## \[/ && found) exit; if (found) print}" CHANGELOG.md > RELEASE_NOTES.md || echo "Release $VERSION" > RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: dist/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') }}
